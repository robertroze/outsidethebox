<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="min-height: 100vh; background: #EEEAE3; font-family: 'Fredoka', system-ui, sans-serif; padding: 64px 48px; display: flex; flex-direction: column; align-items: center; gap: 56px;">

  <div style="text-align: center; color: #8A8276; max-width: 640px;">
    <div style="font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600;">Brand Mark</div>
    <h1 style="font-size: 30px; font-weight: 600; color: #3A352D; margin: 8px 0 0;">Outside the Box — Nuneaton &amp; Bedworth</h1>
  </div>

  <!-- PRIMARY LOGO -->
  <div style="background: #FFFFFF; border-radius: 24px; padding: 72px 80px 64px; box-shadow: 0 18px 50px rgba(58,53,45,0.08); display: flex; flex-direction: column; align-items: center; gap: 36px;">

    <svg width="280" height="268" viewBox="0 0 240 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Outside the Box logo mark">
      <!-- back flaps (open, splayed) -->
      <path d="M70 152 L34 132 L40 116 L78 142 Z" fill="{{ kraftLight }}"/>
      <path d="M170 152 L206 132 L200 116 L162 142 Z" fill="{{ kraftLight }}"/>

      <!-- figures bursting out -->
      <sc-for list="{{ figures }}" as="fig" hint-placeholder-count="4">
        <g transform="{{ fig.transform }}">
          <path d="M -6 16 Q -16 7 -19 -7" fill="none" stroke="{{ fig.color }}" stroke-width="6.5" stroke-linecap="round"/>
          <path d="M 6 16 Q 16 7 19 -7" fill="none" stroke="{{ fig.color }}" stroke-width="6.5" stroke-linecap="round"/>
          <rect x="-9" y="10" width="18" height="46" rx="9" fill="{{ fig.color }}"/>
          <circle cx="0" cy="-2" r="9.5" fill="{{ fig.color }}"/>
          <circle cx="-19" cy="-7" r="4" fill="{{ fig.color }}"/>
          <circle cx="19" cy="-7" r="4" fill="{{ fig.color }}"/>
        </g>
      </sc-for>

      <!-- box front -->
      <path d="M62 150 L178 150 L172 212 Q172 216 168 216 L72 216 Q68 216 68 212 Z" fill="{{ kraft }}"/>
      <!-- front folded flap -->
      <path d="M62 150 L178 150 L170 172 L70 172 Z" fill="{{ kraftDark }}"/>
      <!-- tape -->
      <rect x="108" y="150" width="24" height="22" fill="{{ kraftLight }}" opacity="0.6"/>
    </svg>

    <div style="text-align: center;">
      <div style="font-size: 44px; font-weight: 700; letter-spacing: -0.01em; line-height: 0.95; color: {{ wordColor }};">{{ titleTop }}</div>
      <div style="font-size: 13.5px; font-weight: 500; letter-spacing: 0.34em; text-transform: uppercase; color: {{ sublineColor }}; margin-top: 12px;">{{ subline }}</div>
    </div>

  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 720, &quot;height&quot;: 760}, &quot;colorOrange&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F2A03D&quot;}, &quot;colorRed&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E96A5C&quot;}, &quot;colorBlue&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#4F8DBF&quot;}, &quot;colorGreen&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#5DB87C&quot;}, &quot;kraft&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#D89F5E&quot;}, &quot;wordColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#3A352D&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const c1 = p.colorOrange ?? '#F2A03D';
    const c2 = p.colorRed ?? '#E96A5C';
    const c3 = p.colorBlue ?? '#4F8DB8';
    const c4 = p.colorGreen ?? '#5DB87C';
    // x center, y offset (lower y = higher head), color
    const layout = [
      { x: 90,  y: 116, color: c1 },
      { x: 110, y: 100, color: c2 },
      { x: 130, y: 104, color: c3 },
      { x: 150, y: 120, color: c4 },
    ];
    const figures = layout.map(f => ({
      color: f.color,
      transform: `translate(${f.x} ${f.y})`,
    }));
    return {
      figures,
      kraft: p.kraft ?? '#D89F5E',
      kraftLight: p.kraftLight ?? '#E8C089',
      kraftDark: p.kraftDark ?? '#C68A45',
      titleTop: 'OUTSIDE THE BOX',
      subline: 'Nuneaton & Bedworth',
      wordColor: p.wordColor ?? '#3A352D',
      sublineColor: p.sublineColor ?? '#9A8B6E',
    };
  }
}
</script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
